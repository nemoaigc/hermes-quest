<svg xmlns="http://www.w3.org/2000/svg" width="800" height="240" viewBox="0 0 800 240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1208" />
      <stop offset="40%" style="stop-color:#2a1a0a" />
      <stop offset="100%" style="stop-color:#0f0a04" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5d89a" />
      <stop offset="50%" style="stop-color:#e8b84b" />
      <stop offset="100%" style="stop-color:#c4922a" />
    </linearGradient>
    <linearGradient id="ember" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e87b45" />
      <stop offset="100%" style="stop-color:#c45a28" />
    </linearGradient>
    <filter id="warm-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#e8a84b" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="ember-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#e87b45" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark warm background -->
  <rect width="800" height="240" fill="url(#bg)" rx="8"/>

  <!-- Subtle wood grain lines -->
  <line x1="0" y1="60" x2="800" y2="58" stroke="#3a2810" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="120" x2="800" y2="122" stroke="#3a2810" stroke-width="0.5" opacity="0.2"/>
  <line x1="0" y1="180" x2="800" y2="178" stroke="#3a2810" stroke-width="0.5" opacity="0.3"/>

  <!-- Warm ambient particles (like fireplace embers) -->
  <circle cx="80" cy="45" r="1.5" fill="#e8a84b" opacity="0.3"/>
  <circle cx="200" cy="30" r="1" fill="#e87b45" opacity="0.25"/>
  <circle cx="350" cy="50" r="1.5" fill="#e8a84b" opacity="0.2"/>
  <circle cx="500" cy="35" r="1" fill="#c4922a" opacity="0.3"/>
  <circle cx="620" cy="45" r="1.5" fill="#e87b45" opacity="0.25"/>
  <circle cx="740" cy="30" r="1" fill="#e8a84b" opacity="0.2"/>

  <!-- Top decorative border -->
  <rect x="100" y="42" width="600" height="1" fill="#c4922a" opacity="0.2"/>
  <rect x="200" y="44" width="400" height="1" fill="#e8a84b" opacity="0.15"/>

  <!-- Pixel sword left -->
  <g transform="translate(155, 78) scale(1.2)" opacity="0.6">
    <!-- blade -->
    <rect x="0" y="0" width="5" height="5" fill="#d4d4d4"/>
    <rect x="5" y="5" width="5" height="5" fill="#c0c0c0"/>
    <rect x="10" y="10" width="5" height="5" fill="#a8a8a8"/>
    <!-- guard -->
    <rect x="12" y="15" width="8" height="4" fill="#e8a84b"/>
    <!-- handle -->
    <rect x="15" y="19" width="4" height="8" fill="#8B5E3C"/>
    <rect x="15" y="27" width="4" height="4" fill="#e8a84b"/>
  </g>

  <!-- Pixel sword right (mirrored) -->
  <g transform="translate(612, 78) scale(1.2)" opacity="0.6">
    <rect x="22" y="0" width="5" height="5" fill="#d4d4d4"/>
    <rect x="17" y="5" width="5" height="5" fill="#c0c0c0"/>
    <rect x="12" y="10" width="5" height="5" fill="#a8a8a8"/>
    <rect x="7" y="15" width="8" height="4" fill="#e8a84b"/>
    <rect x="8" y="19" width="4" height="8" fill="#8B5E3C"/>
    <rect x="8" y="27" width="4" height="4" fill="#e8a84b"/>
  </g>

  <!-- HERMES — warm gold -->
  <text x="400" y="100" font-family="'Georgia', 'Times New Roman', serif" font-size="58" font-weight="bold" fill="url(#gold)" text-anchor="middle" filter="url(#warm-glow)" letter-spacing="18">HERMES</text>

  <!-- QUEST — ember orange -->
  <text x="400" y="145" font-family="'Georgia', 'Times New Roman', serif" font-size="32" font-weight="bold" fill="url(#ember)" text-anchor="middle" filter="url(#ember-glow)" letter-spacing="24">Q U E S T</text>

  <!-- Bottom decorative border -->
  <rect x="200" y="162" width="400" height="1" fill="#e8a84b" opacity="0.15"/>
  <rect x="100" y="164" width="600" height="1" fill="#c4922a" opacity="0.2"/>

  <!-- Tagline EN -->
  <text x="400" y="190" font-family="'Georgia', serif" font-size="13" fill="#c4922a" text-anchor="middle" opacity="0.8">Self-Evolving AI Agent  ·  Pixel RPG Adventure  ·  Built on Hermes</text>

  <!-- Tagline CN -->
  <text x="400" y="212" font-family="'Georgia', serif" font-size="12" fill="#c4922a" text-anchor="middle" opacity="0.5">自我进化 AI Agent  ·  像素 RPG 冒险  ·  基于 Hermes 构建</text>
</svg>
